<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบป้องกันการติด C - ข้าราชการผู้ป่วยใน (CIPN)</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            box-sizing: border-box;
        }

        .full-width-container {
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 50%, #90caf9 100%);
            padding: 20px;
        }

        .main-layout {
            display: flex;
            gap: 20px;
            min-height: calc(100vh - 140px);
        }

        /* Left Sidebar - 20% */
        .left-sidebar {
            width: 20%;
            min-width: 200px;
            background: linear-gradient(135deg, #ffffff 0%, #f5f9ff 100%);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(66, 165, 245, 0.15);
            border: 1px solid #e3f2fd;
            overflow-y: auto;
        }

        .sidebar-title {
            color: #1565c0;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e3f2fd;
        }

        .file-menu-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            background: #f5f9ff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .file-menu-item:hover {
            background: #e3f2fd;
            border-left-color: #42a5f5;
            transform: translateX(5px);
        }

        .file-menu-item.active {
            background: linear-gradient(135deg, #42a5f5 0%, #2196f3 100%);
            color: white;
            border-left-color: #1976d2;
        }

        .file-menu-item-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .file-menu-item-code {
            font-size: 12px;
            opacity: 0.8;
        }

        /* Right Content - 80% */
        .right-content {
            width: 80%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #ffffff 0%, #f5f9ff 100%);
            padding: 25px 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(66, 165, 245, 0.15);
            border: 1px solid #e3f2fd;
        }

        .top-bar h1 {
            color: #1565c0;
            font-size: 28px;
            margin: 0;
            font-weight: 600;
        }

        .btn-home {
            padding: 12px 28px;
            background: linear-gradient(135deg, #42a5f5 0%, #2196f3 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
        }

        .btn-home:hover {
            background: linear-gradient(135deg, #1e88e5 0%, #1976d2 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(33, 150, 243, 0.4);
        }

        /* Filter Panel */
        .filter-panel {
            background: linear-gradient(135deg, #ffffff 0%, #f5f9ff 100%);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 16px rgba(66, 165, 245, 0.15);
            border: 1px solid #e3f2fd;
            margin-bottom: 20px;
        }

        .filter-content {
            display: flex;
            gap: 20px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 5px;
            color: #546e7a;
            font-size: 14px;
            font-weight: 600;
        }

        .filter-group input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e3f2fd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .filter-group input:focus {
            outline: none;
            border-color: #42a5f5;
            box-shadow: 0 0 0 3px rgba(66, 165, 245, 0.1);
        }

        .btn-search {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #42a5f5 0%, #2196f3 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
        }

        .btn-search:hover {
            background: linear-gradient(135deg, #1e88e5 0%, #1976d2 100%);
            transform: translateY(-2px);
        }

        /* Dashboard Statistics */
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #ffffff 0%, #f5f9ff 100%);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 16px rgba(66, 165, 245, 0.15);
            border: 1px solid #e3f2fd;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 20px rgba(66, 165, 245, 0.25);
        }

        .stat-card.total {
            border-left: 4px solid #42a5f5;
        }

        .stat-card.correct {
            border-left: 4px solid #4caf50;
        }

        .stat-card.needfix {
            border-left: 4px solid #ff9800;
        }

        .stat-card.pending {
            border-left: 4px solid #9e9e9e;
        }

        .stat-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 14px;
            color: #546e7a;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #1565c0;
        }

        .stat-value.green {
            color: #4caf50;
        }

        .stat-value.orange {
            color: #ff9800;
        }

        .stat-value.gray {
            color: #9e9e9e;
        }

        /* Content Area */
        .content-area {
            background: linear-gradient(135deg, #ffffff 0%, #f5f9ff 100%);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 16px rgba(66, 165, 245, 0.15);
            border: 1px solid #e3f2fd;
        }

        .welcome-message {
            text-align: center;
            color: #546e7a;
        }

        .welcome-message h2 {
            color: #1565c0;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="full-width-container">
        <!-- Top Bar -->
        <div class="top-bar">
            <h1>🏥 ตรวจสอบป้องกันการติด C - ข้าราชการผู้ป่วยใน (CIPN)</h1>
            <button class="btn-home" onclick="window.location.href='check_c.html'">← กลับหน้าตรวจสอบป้องกันการติด C</button>
        </div>

        <!-- Main Layout: Sidebar + Content -->
        <div class="main-layout">
            <!-- Left Sidebar (20%) -->
            <div class="left-sidebar">
                <div class="sidebar-title">📁 แฟ้มข้อมูล</div>
                <div id="menu-list">
                    <div class="file-menu-item active" data-name="all">
                        <div class="file-menu-item-title">ตรวจสอบทั้งหมด</div>
                        <div class="file-menu-item-code">All Checks</div>
                    </div>
                    <div class="file-menu-item" data-name="group46">
                        <div class="file-menu-item-title">กลุ่ม 46 กรณีใช้เลขอนุมัติ</div>
                        <div class="file-menu-item-code">Group 46 Auth</div>
                    </div>
                </div>
            </div>

            <!-- Right Content (80%) -->
            <div class="right-content">
                <!-- Filter Panel -->
        <div class="filter-panel">
            <div class="filter-content">
                <div class="filter-group">
                    <label for="dateFrom">วันที่จำหน่ายเริ่มต้น:</label>
                    <input type="date" id="dateFrom">
                </div>
                <div class="filter-group">
                    <label for="dateTo">วันที่จำหน่ายสิ้นสุด:</label>
                    <input type="date" id="dateTo">
                </div>
                <div class="filter-group">
                    <label>สิทธิการรักษา:</label>
                    <div style="position:relative;">
                        <button type="button" id="pttype-dropdown" onclick="togglePttypeDropdown()" style="width:100%;padding:9px 12px;border:2px solid #e3f2fd;border-radius:8px;font-size:14px;background:white;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;min-width:220px;">
                            <span id="pttype-selected-text">เลือกสิทธิการรักษา</span>
                            <span>▼</span>
                        </button>
                        <div id="pttype-dropdown-menu" style="display:none;position:absolute;top:100%;left:0;min-width:100%;max-height:300px;overflow-y:auto;background:white;border:2px solid #e3f2fd;border-radius:8px;margin-top:4px;z-index:1000;box-shadow:0 4px 16px rgba(66,165,245,0.2);">
                        </div>
                    </div>
                </div>
                <div class="filter-buttons" style="display:flex;flex-direction:column;gap:8px;align-items:flex-start;">
                    <button class="btn-search" onclick="searchData()">🔍 ค้นหา</button>
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;color:#c62828;font-weight:700;white-space:nowrap;user-select:none;">
                        <input type="checkbox" id="show-errors-only" onchange="onShowErrorsChange()" style="width:17px;height:17px;cursor:pointer;accent-color:#c62828;">
                        แสดงเฉพาะรายการที่ต้องแก้ไข
                    </label>
                </div>
            </div>
        </div>

        <!-- Dashboard Statistics (4 boxes) -->
        <div class="dashboard-stats" id="dashboard-stats">
            <div class="stat-card total">
                <div class="stat-icon">👥</div>
                <div class="stat-label">ผู้รับบริการทั้งหมด</div>
                <div class="stat-value" id="stat-total">-</div>
            </div>

            <div class="stat-card correct">
                <div class="stat-icon">✅</div>
                <div class="stat-label">ข้อมูลถูกต้อง</div>
                <div class="stat-value green" id="stat-correct">-</div>
            </div>

            <div class="stat-card needfix">
                <div class="stat-icon">⚠️</div>
                <div class="stat-label">ต้องแก้ไข</div>
                <div class="stat-value orange" id="stat-needfix">-</div>
            </div>

            <div class="stat-card pending">
                <div class="stat-icon">⏳</div>
                <div class="stat-label">รอดำเนินการ</div>
                <div class="stat-value gray" id="stat-pending">-</div>
            </div>
        </div>

                <!-- Content Area -->
                <div class="content-area" id="content-area">
                    <div class="welcome-message">
                        <h2>เลือกช่วงวันที่</h2>
                        <p>กรุณาเลือกช่วงวันที่แล้วคลิก "🔍 ค้นหา" เพื่อแสดงข้อมูล</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script_check_c_detail.js"></script>
    <script>
        window.checkType = 'cipn';
        window.currentMenu = 'all';

        // ตั้งวันที่เป็นวันนี้และโหลด pttype เมื่อโหลดหน้า
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('dateFrom').value = today;
            document.getElementById('dateTo').value   = today;
            loadPttypeList();
        });

        function togglePttypeDropdown() {
            const menu = document.getElementById('pttype-dropdown-menu');
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }

        function updatePttypeText() {
            const checked = document.querySelectorAll('input[name="pttype"]:checked');
            const txt = document.getElementById('pttype-selected-text');
            if (checked.length === 0)      txt.textContent = 'เลือกสิทธิการรักษา';
            else if (checked.length === 1) txt.textContent = checked[0].nextElementSibling.textContent;
            else                           txt.textContent = `เลือกแล้ว ${checked.length} รายการ`;
        }

        function getSelectedPttypes() {
            return Array.from(document.querySelectorAll('input[name="pttype"]:checked')).map(cb => cb.value);
        }

        document.addEventListener('click', e => {
            const btn = document.getElementById('pttype-dropdown');
            const menu = document.getElementById('pttype-dropdown-menu');
            if (btn && menu && !btn.contains(e.target) && !menu.contains(e.target)) {
                menu.style.display = 'none';
            }
        });

        async function loadPttypeList() {
            const cfg = JSON.parse(localStorage.getItem('dbConnection') || 'null');
            if (!cfg) return;
            try {
                const res = await fetch(`${window.location.origin}/api/get-cipn-pttype-list`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ host: cfg.host, port: cfg.port, database: cfg.database, user: cfg.user, password: cfg.password, type: cfg.type })
                });
                const result = await res.json();
                if (!result.success) return;
                const container = document.getElementById('pttype-dropdown-menu');
                container.innerHTML = '';
                result.data.forEach(row => {
                    const wrap = document.createElement('div');
                    wrap.style.cssText = 'padding:10px 15px;display:flex;align-items:center;gap:10px;cursor:pointer;';
                    wrap.addEventListener('mouseenter', () => wrap.style.background='#f5f9ff');
                    wrap.addEventListener('mouseleave', () => wrap.style.background='white');

                    const cb = document.createElement('input');
                    cb.type = 'checkbox'; cb.name = 'pttype';
                    cb.id = `pttype-${row.pttype}`; cb.value = row.pttype;
                    cb.style.cssText = 'width:16px;height:16px;cursor:pointer;';
                    cb.addEventListener('change', updatePttypeText);

                    const lbl = document.createElement('label');
                    lbl.htmlFor = `pttype-${row.pttype}`;
                    lbl.textContent = row.name;
                    lbl.style.cssText = 'cursor:pointer;font-size:14px;color:#546e7a;flex:1;';

                    wrap.addEventListener('click', e => { if (e.target !== cb) { cb.checked = !cb.checked; updatePttypeText(); } });
                    wrap.appendChild(cb); wrap.appendChild(lbl);
                    container.appendChild(wrap);
                });
            } catch(e) {}
        }

        // Menu click handler
        document.querySelectorAll('#menu-list .file-menu-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('#menu-list .file-menu-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                window.currentMenu = this.getAttribute('data-name');
                document.getElementById('content-area').scrollTop = 0;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });

        function onShowErrorsChange() {
            if (window.currentMenu === 'group46') {
                renderGroup46Table();
            } else {
                // เมนู all — re-render ตาราง mock (กรองโดย status)
                const orig = window._origSearch;
                if (orig) orig();
            }
        }

        // Override searchData
        function searchData() {
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo   = document.getElementById('dateTo').value;
            if (!dateFrom || !dateTo) { alert('กรุณาเลือกวันที่เริ่มต้นและวันที่สิ้นสุด'); return; }

            if (window.currentMenu === 'group46') {
                searchGroup46(dateFrom, dateTo, getSelectedPttypes());
            } else {
                const orig = window._origSearch;
                if (orig) orig();
            }
        }

        async function searchGroup46(dateFrom, dateTo, selectedPttypes) {
            const cfg = JSON.parse(localStorage.getItem('dbConnection') || 'null');
            if (!cfg) { alert('⚠️ ยังไม่ได้เชื่อมต่อฐานข้อมูล'); return; }
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = '<div class="welcome-message"><h2>⏳ กำลังโหลด กลุ่ม 46 กรณีใช้เลขอนุมัติ...</h2><p>กรุณารอสักครู่</p></div>';
            try {
                const res = await fetch(`${window.location.origin}/api/get-cipn-group46`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ host: cfg.host, port: cfg.port, database: cfg.database, user: cfg.user, password: cfg.password, type: cfg.type, dateFrom, dateTo, selectedPttypes })
                });
                const result = await res.json();
                if (!result.success) { contentArea.innerHTML = `<div class="welcome-message"><h2>❌ เกิดข้อผิดพลาด</h2><p>${result.error}</p></div>`; return; }

                const data = result.data;
                if (!data.length) { contentArea.innerHTML = '<div class="welcome-message"><h2>✅ ไม่พบรายการ</h2><p>ไม่มีข้อมูลในช่วงวันที่นี้</p></div>'; return; }

                const needfix = data.filter(r => r.auth_code_check === 'N').length;
                document.getElementById('stat-total').textContent   = data.length.toLocaleString();
                document.getElementById('stat-correct').textContent = (data.length - needfix).toLocaleString();
                document.getElementById('stat-needfix').textContent = needfix.toLocaleString();
                document.getElementById('stat-pending').textContent = '-';

                window._g46Data    = data;
                window._g46Cfg     = { host: cfg.host, port: cfg.port, database: cfg.database, user: cfg.user, password: cfg.password, type: cfg.type };
                window._g46EditKey = null;
                renderGroup46Table(dateFrom, dateTo);
            } catch(err) {
                contentArea.innerHTML = `<div class="welcome-message"><h2>❌ เชื่อมต่อ API ไม่ได้</h2><p>${err.message}</p></div>`;
            }
        }

        function renderGroup46Table(dateFrom, dateTo) {
            const allData = window._g46Data || [];
            if (!allData.length) return;
            const showErrorsOnly = document.getElementById('show-errors-only')?.checked;
            const data = showErrorsOnly ? allData.filter(r => r.auth_code_check === 'N') : allData;
            if (!data.length) {
                document.getElementById('content-area').innerHTML = '<div class="welcome-message"><h2>✅ ไม่พบรายการที่ต้องแก้ไข</h2><p>ข้อมูลทุกรายการครบถ้วน</p></div>';
                return;
            }
            const editKey = window._g46EditKey;
            const cols = Object.keys(allData[0]).filter(c => c !== 'auth_code_check');
            const e = v => String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            const DATE_COLS = ['date_admit', 'dchdate'];
            const fmtDate = v => { if (!v) return ''; const s = String(v); if (s.includes('T')) return s.split('T')[0]; if (s.includes(' ')) return s.split(' ')[0]; return s.slice(0,10); };

            let html = `
                <div style="margin-bottom:12px;font-size:16px;font-weight:700;color:#1565c0;">
                    📋 กลุ่ม 46 กรณีใช้เลขอนุมัติ (${data.length.toLocaleString()}${showErrorsOnly?' / ทั้งหมด '+allData.length.toLocaleString():''} รายการ)
                    <span style="font-size:13px;color:#546e7a;">${dateFrom||''} ถึง ${dateTo||''}</span>
                </div>
                <div style="overflow-x:scroll;">
                <table style="width:100%;border-collapse:collapse;font-size:14px;">
                <thead><tr style="background:linear-gradient(135deg,#42a5f5,#2196f3);color:white;">
                    <th style="padding:8px 6px;border:1px solid #e3f2fd;text-align:center;width:1%;white-space:nowrap;"></th>
                    <th style="padding:8px;border:1px solid #e3f2fd;text-align:center;">ลำดับ</th>
                    ${cols.map(c=>`<th style="padding:8px;border:1px solid #e3f2fd;white-space:nowrap;">${e(c)}</th>`).join('')}
                </tr></thead><tbody>`;

            data.forEach((row, idx) => {
                const bg = idx%2===0?'#f5f9ff':'white';
                const an = String(row.an??'');
                const isEdit = editKey !== null && editKey === an;
                const isRed  = row.auth_code_check === 'N';

                html += `<tr style="background:${isEdit?'#fff9c4':bg};" data-an="${e(an)}">`;

                // Edit / Save+Cancel buttons
                if (isEdit) {
                    html += `<td style="padding:4px;border:1px solid #e3f2fd;text-align:center;white-space:nowrap;width:1%;">
                        <div style="display:flex;gap:4px;">
                            <button onclick="saveGroup46AuthCode('${e(an)}')" style="padding:4px 8px;background:linear-gradient(135deg,#43a047,#2e7d32);color:white;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;">💾 บันทึก</button>
                            <button onclick="window._g46EditKey=null;renderGroup46Table()" style="padding:4px 8px;background:#e0e0e0;color:#546e7a;border:none;border-radius:4px;cursor:pointer;font-size:12px;">✕</button>
                        </div></td>`;
                } else {
                    html += `<td style="padding:4px;border:1px solid #e3f2fd;text-align:center;white-space:nowrap;width:1%;">
                        <button onclick="window._g46EditKey='${e(an)}';renderGroup46Table()" style="padding:4px 10px;background:#e3f2fd;color:#1565c0;border:1px solid #90caf9;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;">แก้ไข ✏️</button></td>`;
                }

                html += `<td style="padding:8px;border:1px solid #e3f2fd;text-align:center;">${idx+1}</td>`;

                cols.forEach(col => {
                    const val = row[col];
                    const isAuthCode = col === 'auth_code';
                    if (isEdit && isAuthCode) {
                        html += `<td style="padding:4px;border:1px solid #e3f2fd;">
                            <input id="edit-auth-${e(an)}" data-field="auth_code" value="${e(val)}"
                                style="width:100%;min-width:120px;padding:4px 8px;border:2px solid #42a5f5;border-radius:4px;font-size:13px;">
                            </td>`;
                    } else if (isAuthCode && isRed) {
                        html += `<td style="padding:8px;border:1px solid #e3f2fd;background:#f44336;color:white;font-weight:600;white-space:nowrap;">${e(val)}</td>`;
                    } else if (DATE_COLS.includes(col)) {
                        html += `<td style="padding:8px;border:1px solid #e3f2fd;white-space:nowrap;">${e(fmtDate(val))}</td>`;
                    } else {
                        html += `<td style="padding:8px;border:1px solid #e3f2fd;white-space:nowrap;">${e(val)}</td>`;
                    }
                });

                html += `</tr>`;
            });

            html += '</tbody></table></div>';
            document.getElementById('content-area').innerHTML = html;
        }

        async function saveGroup46AuthCode(an) {
            const cfg = window._g46Cfg;
            if (!cfg) return;
            const input = document.getElementById(`edit-auth-${an}`);
            if (!input) return;
            const newVal = input.value.trim();
            try {
                const res = await fetch(`${window.location.origin}/api/update-cipn-auth-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...cfg, an, auth_code: newVal })
                });
                const r = await res.json();
                if (!r.success) { alert('บันทึกไม่สำเร็จ: ' + (r.error||'')); return; }
                // อัพเดตค่าใน local data
                const row = window._g46Data.find(d => String(d.an) === String(an));
                if (row) {
                    row.auth_code = newVal;
                    row.auth_code_check = (newVal && !newVal.startsWith('PP')) ? 'Y' : 'N';
                }
                window._g46EditKey = null;
                renderGroup46Table();
            } catch(err) { alert('เกิดข้อผิดพลาด: ' + err.message); }
        }
    </script>
