<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบป้องกันการติด C - ข้าราชการผู้ป่วยนอก (CSOP)</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            box-sizing: border-box;
        }

        .full-width-container {
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 50%, #90caf9 100%);
            padding: 20px;
        }

        .main-layout {
            display: flex;
            gap: 20px;
            min-height: calc(100vh - 140px);
        }

        /* Left Sidebar - 20% */
        .left-sidebar {
            width: 20%;
            min-width: 200px;
            background: linear-gradient(135deg, #ffffff 0%, #f5f9ff 100%);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(66, 165, 245, 0.15);
            border: 1px solid #e3f2fd;
            overflow-y: auto;
        }

        .sidebar-title {
            color: #1565c0;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e3f2fd;
        }

        .file-menu-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            background: #f5f9ff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .file-menu-item:hover {
            background: #e3f2fd;
            border-left-color: #42a5f5;
            transform: translateX(5px);
        }

        .file-menu-item.active {
            background: linear-gradient(135deg, #42a5f5 0%, #2196f3 100%);
            color: white;
            border-left-color: #1976d2;
        }

        .file-menu-item-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .file-menu-item-code {
            font-size: 12px;
            opacity: 0.8;
        }

        /* Right Content - 80% */
        .right-content {
            width: 80%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #ffffff 0%, #f5f9ff 100%);
            padding: 25px 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(66, 165, 245, 0.15);
            border: 1px solid #e3f2fd;
        }

        .top-bar h1 {
            color: #1565c0;
            font-size: 28px;
            margin: 0;
            font-weight: 600;
        }

        .btn-home {
            padding: 12px 28px;
            background: linear-gradient(135deg, #42a5f5 0%, #2196f3 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
        }

        .btn-home:hover {
            background: linear-gradient(135deg, #1e88e5 0%, #1976d2 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(33, 150, 243, 0.4);
        }

        /* Filter Panel */
        .filter-panel {
            background: linear-gradient(135deg, #ffffff 0%, #f5f9ff 100%);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 16px rgba(66, 165, 245, 0.15);
            border: 1px solid #e3f2fd;
            margin-bottom: 20px;
        }

        .filter-content {
            display: flex;
            gap: 20px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 5px;
            color: #546e7a;
            font-size: 14px;
            font-weight: 600;
        }

        .filter-group input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e3f2fd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .filter-group input:focus {
            outline: none;
            border-color: #42a5f5;
            box-shadow: 0 0 0 3px rgba(66, 165, 245, 0.1);
        }

        .btn-search {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #42a5f5 0%, #2196f3 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
        }

        .btn-search:hover {
            background: linear-gradient(135deg, #1e88e5 0%, #1976d2 100%);
            transform: translateY(-2px);
        }

        /* Dashboard Statistics */
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #ffffff 0%, #f5f9ff 100%);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 16px rgba(66, 165, 245, 0.15);
            border: 1px solid #e3f2fd;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 20px rgba(66, 165, 245, 0.25);
        }

        .stat-card.total {
            border-left: 4px solid #42a5f5;
        }

        .stat-card.correct {
            border-left: 4px solid #4caf50;
        }

        .stat-card.needfix {
            border-left: 4px solid #ff9800;
        }

        .stat-card.pending {
            border-left: 4px solid #9e9e9e;
        }

        .stat-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 14px;
            color: #546e7a;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #1565c0;
        }

        .stat-value.green {
            color: #4caf50;
        }

        .stat-value.orange {
            color: #ff9800;
        }

        .stat-value.gray {
            color: #9e9e9e;
        }

        /* Content Area */
        .content-area {
            background: linear-gradient(135deg, #ffffff 0%, #f5f9ff 100%);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 16px rgba(66, 165, 245, 0.15);
            border: 1px solid #e3f2fd;
        }

        .welcome-message {
            text-align: center;
            color: #546e7a;
        }

        .welcome-message h2 {
            color: #1565c0;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="full-width-container">
        <!-- Top Bar -->
        <div class="top-bar">
            <h1>👨‍⚕️ ตรวจสอบป้องกันการติด C - ข้าราชการผู้ป่วยนอก (CSOP)</h1>
            <button class="btn-home" onclick="window.location.href='check_c.html'">← กลับหน้าตรวจสอบป้องกันการติด C</button>
        </div>

        <!-- Main Layout: Sidebar + Content -->
        <div class="main-layout">
            <!-- Left Sidebar (20%) -->
            <div class="left-sidebar">
                <div class="sidebar-title">📁 แฟ้มข้อมูล</div>
                <div class="file-menu-item active">
                    <div class="file-menu-item-title">ตรวจสอบทั้งหมด</div>
                    <div class="file-menu-item-code">All Checks</div>
                </div>
            </div>

            <!-- Right Content (80%) -->
            <div class="right-content">
                <!-- Filter Panel -->
        <div class="filter-panel">
            <div class="filter-content">
                <div class="filter-group">
                    <label for="dateFrom">วันที่เริ่มต้น:</label>
                    <input type="date" id="dateFrom">
                </div>
                <div class="filter-group">
                    <label for="dateTo">วันที่สิ้นสุด:</label>
                    <input type="date" id="dateTo">
                </div>
                <div class="filter-buttons">
                    <button class="btn-search" onclick="searchData()">🔍 ค้นหา</button>
                </div>
            </div>
        </div>

        <!-- Dashboard Statistics (4 boxes) -->
        <div class="dashboard-stats" id="dashboard-stats">
            <div class="stat-card total">
                <div class="stat-icon">👥</div>
                <div class="stat-label">ผู้รับบริการทั้งหมด</div>
                <div class="stat-value" id="stat-total">-</div>
            </div>

            <div class="stat-card correct">
                <div class="stat-icon">✅</div>
                <div class="stat-label">ข้อมูลถูกต้อง</div>
                <div class="stat-value green" id="stat-correct">-</div>
            </div>

            <div class="stat-card needfix">
                <div class="stat-icon">⚠️</div>
                <div class="stat-label">ต้องแก้ไข</div>
                <div class="stat-value orange" id="stat-needfix">-</div>
            </div>

            <div class="stat-card pending">
                <div class="stat-icon">⏳</div>
                <div class="stat-label">รอดำเนินการ</div>
                <div class="stat-value gray" id="stat-pending">-</div>
            </div>
        </div>

                <!-- Content Area -->
                <div class="content-area" id="content-area">
                    <div class="welcome-message">
                        <h2>เลือกช่วงวันที่</h2>
                        <p>กรุณาเลือกช่วงวันที่แล้วคลิก "🔍 ค้นหา" เพื่อแสดงข้อมูล</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script_check_c_detail.js"></script>
    <script>
        // Set check type
        window.checkType = 'csop';
    </script>
<script src="zoom_control.js"></script>
</body>
</html>
