<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบข้อมูลพื้นฐาน สำหรับใช้งาน</title>
    <script>
        (function() {
            try {
                const session = JSON.parse(localStorage.getItem('loginSession') || 'null');
                const TIMEOUT = 8 * 60 * 60 * 1000;
                if (!session || !session.loginTime || (Date.now() - session.loginTime) > TIMEOUT) {
                    localStorage.removeItem('loginSession');
                    window.location.replace('login.html');
                }
            } catch(e) {
                window.location.replace('login.html');
            }
        })();
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(8px);
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.5);
        }
        .topbar-title {
            font-size: 20px;
            font-weight: 700;
            color: #880e4f;
        }
        .btn-back {
            padding: 8px 22px;
            background: linear-gradient(135deg, #f48fb1, #f06292);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 10px rgba(240,98,146,0.3);
        }
        .btn-back:hover {
            background: linear-gradient(135deg, #f06292, #e91e63);
            transform: translateY(-1px);
        }
        .center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .placeholder-box {
            background: rgba(255,255,255,0.6);
            border: 2px dashed #f48fb1;
            border-radius: 20px;
            padding: 60px 80px;
            text-align: center;
        }
        .placeholder-icon { font-size: 64px; margin-bottom: 20px; }
        .placeholder-text {
            font-size: 28px;
            font-weight: 700;
            color: #880e4f;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-title">🌸 ระบบตรวจสอบข้อมูลพื้นฐาน สำหรับใช้งาน</div>
        <button class="btn-back" onclick="window.location.href='index_first.html'">← กลับหน้าหลัก</button>
    </div>
    <div class="center">
        <div class="placeholder-box">
            <div class="placeholder-icon">🔧</div>
            <div class="placeholder-text">รอรวมกับของพี่เอก</div>
        </div>
    </div>
    <script src="zoom_control.js"></script>
</body>
</html>
